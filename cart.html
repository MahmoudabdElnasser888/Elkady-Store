<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background: linear-gradient(135deg,#0f0f0f,#072b00);color:white;min-height:100vh;padding:20px;}
.cart-container{max-width:1100px;margin:0 auto;background:rgba(255,255,255,0.05);backdrop-filter:blur(25px);border-radius:20px;padding:30px;animation:fadeIn 0.8s ease forwards;opacity:0;transform:translateY(30px);}
@keyframes fadeIn{to{opacity:1;transform:translateY(0);}}
.cart-item{display:flex;align-items:center;gap:20px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.1);}
.cart-item img{width:100px;height:100px;object-fit:cover;border-radius:15px;}
.cart-info{flex:1;}
.cart-info h4{margin-bottom:10px;font-size:18px;}
.cart-info p{margin-bottom:5px;color:#ccc;}
.qty-container{display:flex;align-items:center;gap:10px;margin-top:5px;}
.qty-container button{background:transparent;color:#46c712;font-size:18px;border:2px solid #46c712;padding:4px 10px;border-radius:8px;cursor:pointer;transition:0.3s;}
.qty-container button:hover{transform:scale(1.1);}
.qty-container span{min-width:25px;text-align:center;display:inline-block;font-size:16px;}
.remove-btn{background:transparent;border:none;color:#ff4d4d;cursor:pointer;font-size:14px;transition:0.3s;}
.remove-btn:hover{color:#ff1a1a;transform:scale(1.1);}
.summary{margin-top:30px;background:rgba(0,0,0,0.3);padding:20px;border-radius:15px;}
.summary h3{margin-bottom:15px;color:#46c712;}
.summary p{margin-bottom:10px;color:#ccc;}
.summary span{font-weight:600;color:#46c712;}
.checkout-btn{width:100%;padding:14px;font-size:16px;border-radius:30px;background:linear-gradient(45deg,#46c712,#4de207d0);color:white;font-weight:600;cursor:pointer;border:none;transition:0.3s;margin-top:15px;}
.checkout-btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(38, 255, 49, 0.5);}
.empty-msg{text-align:center;color:#ccc;font-size:18px;margin-top:50px;}
.toast{
  position:fixed;
  bottom:30px;
  right:30px;
  background:linear-gradient(45deg,#46c712,#5eff00);
  padding:15px 25px;
  border-radius:15px;
  color:white;
  font-weight:600;
  opacity:0;
  transform:translateY(20px);
  transition:0.3s ease;
  z-index:9999;
  box-shadow:0 10px 25px rgba(125, 255, 38, 0.5);
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}









/* modal content */
.modal-content form {
  display: flex;
  flex-direction: column;
  gap: 15px; /* مسافة بين كل عنصر */
}

.modal-content input,
.modal-content select,
.modal-content button {
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ffffff;
  background: rgba(255, 255, 255, 0.05);
  color: white;
}

.modal-content label {
  font-weight: 600;
  color: #ffffff;
}

.modal-content button[type="submit"] {
  background: linear-gradient(45deg,#46c712,#33ff00);
  color: white;
  font-weight: bold;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.modal-content button[type="submit"]:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(81, 255, 38, 0.5);
}



#paymentMethod {
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #46c712;
  background: rgba(255,255,255,0.05);
  color: white;
  font-weight: 600;
  appearance: none; /* لإزالة الشكل الافتراضي */
}

#paymentMethod option {
  background: #1a002b; /* خلفية داكنة لتتناسب مع شكل الصفحة */
  color: white;
  padding: 8px;
}

/* لو عايز تمييز كلمة "Cash on Delivery" */
#paymentMethod option[value="cod"] {
  color: #ff4d4d; /* احمر مميز */
  font-weight: bold;
}
#paymentMethod option[value="vodafone"] {
  color: #46c712; /* بنفس لون التدرج البنفسجي */
  font-weight: bold;
}


.whatsapp-btn{
  display:block;
  padding:12px;
  border-radius:25px;
  background:linear-gradient(45deg,#25D366,#128C7E);
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.whatsapp-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(37,211,102,0.4);
}
</style>
</head>
<body>


  <div id="loadingScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:10000;">
  <div style="color:white;font-size:20px;">
    <span>Loading...</span>
  </div>
</div>

<div class="cart-container" id="cartContainer">
<h2>Your Cart</h2>
<div id="cartItems"></div>

<div class="summary" id="cartSummary" style="display:none;">
<h3>Order Summary</h3>
<p>Base Total: <span id="baseTotal">0</span> EGP</p>
<p>
<label>Province & Shipping: </label>
<select id="province">
  <option value="cairo" data-shipping="80">Cairo</option>
  <option value="giza" data-shipping="50">Giza</option>
</select>
</p>
<p>Quantity Total: <span id="totalQty">0</span></p>

<button class="checkout-btn" id="checkoutBtn">Buy Now</button>
</div>
</div>

<!-- BUY NOW MODAL -->
<div class="modal" id="buyModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:0.3s;z-index:999;">
<div class="modal-content" style="background:#092b00;padding:30px;border-radius:20px;max-width:500px;width:90%;position:relative;max-height:90vh;overflow-y:auto;">
  <div style="text-align:center;margin-top:10px;">
  <a href="https://wa.me/2001153919147" target="_blank" class="whatsapp-btn">
    💬 Contact on WhatsApp
  </a>
</div>
<span class="close-modal" id="closeModal" style="position:absolute;top:15px;right:20px;cursor:pointer;color:#46c712;font-weight:bold;font-size:20px;">&times;</span>
<h3>Checkout</h3>
<form id="checkoutForm">
<label>Name</label>
<input type="text" id="userName" required>

<label>Phone</label>
<input type="text" id="userPhone" required>

<label>Address</label>
<input type="text" id="userAddress" required>

<label>Payment Method</label>
<select id="paymentMethod">
<option value="cod">Cash on Delivery</option>
<option value="Vodafon">Vodafon Cash</option>
</select>

<p id="paymentInstructions" style="color:#ffffff;margin-top:5px;"></p>

<label id="transferLabel" style="display:none;">Upload Transfer Image</label>
<input type="file" id="transferImg" style="display:none;" required>

<label><input type="checkbox" id="terms"> I agree to <a href="terms.html" target="_blank" style="color:#46c712;">terms & conditions</a></label>

<p class="total-summary">
  Base Total: <span id="modalBaseTotal">0</span> EGP<br>
  Shipping: <span id="modalShipping">0</span> EGP<br>
Total: <span id="modalGrandTotal">0</span> EGP
</p>

<button type="submit">Confirm Order</button>
</form>
</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, runTransaction, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.addEventListener("DOMContentLoaded", () => {

  const loadingScreen = document.getElementById("loadingScreen");

  const firebaseConfig = {
    apiKey: "AIzaSyDyZbGtqcZ0Pggwnk_wUAA_Sjn8XNIXtbI",
    authDomain: "stock-side.firebaseapp.com",
    projectId: "stock-side",
    storageBucket: "stock-side.firebasestorage.app",
    messagingSenderId: "650352784923",
    appId: "1:650352784923:web:59e29f1567abb56925eabe",
    measurementId: "G-7L6GF875ED"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ===== عناصر الصفحة =====
  const cartItemsEl = document.getElementById("cartItems");
  const cartSummary = document.getElementById("cartSummary");
  const baseTotalEl = document.getElementById("baseTotal");
  const totalQtyEl = document.getElementById("totalQty");
  const grandTotalEl = document.getElementById("grandTotal");
  const provinceEl = document.getElementById("province");
  const checkoutBtn = document.getElementById("checkoutBtn");
  const buyModal = document.getElementById("buyModal");
  const closeModal = document.getElementById("closeModal");
  const paymentMethodEl = document.getElementById("paymentMethod");
  const paymentInstructions = document.getElementById("paymentInstructions");
  const transferLabel = document.getElementById("transferLabel");
  const transferImg = document.getElementById("transferImg");
  const form = document.getElementById("checkoutForm");

  // ===== إنشاء toast =====
  let toast = document.createElement("div");
  toast.classList.add("toast");
  toast.id="toast";
  toast.innerHTML = `<span id="toastMsg"></span>`;
  document.body.appendChild(toast);

  function showToast(msg){
    const toast = document.getElementById("toast");
    const toastMsg = toast.querySelector("#toastMsg");
    if(!toastMsg) return;
    toastMsg.innerText = msg;
    toast.classList.add("show");
    setTimeout(()=>{ toast.classList.remove("show"); },3000);
  }

  // ===== تحميل cart =====
  let cart = JSON.parse(localStorage.getItem("cart"))||[];

  function renderCart(){
    
    cartItemsEl.innerHTML = "";
    if(cart.length === 0){
      cartItemsEl.innerHTML = '<p class="empty-msg">Your cart is empty</p>';
      cartSummary.style.display="none";
      return;
    }
    cartSummary.style.display="block";
    let baseTotal = 0;
    let totalQty = 0;

    cart.forEach((item,i)=>{
      baseTotal += item.price*item.qty;
      totalQty += item.qty;

      const div = document.createElement("div");
      div.classList.add("cart-item");
      div.innerHTML = `
        <img src="${item.image}" alt="${item.name}">
        <div class="cart-info">
          <h4>${item.name}</h4>
          <p>Price: ${item.price} EGP</p>
          <div class="qty-container">
            <button class="minus" data-index="${i}">−</button>
            <span>${item.qty}</span>
            <button class="plus" data-index="${i}">+</button>
          </div>
          <p>Subtotal: ${item.price*item.qty} EGP</p>
          <button class="remove-btn" data-index="${i}">Remove</button>
        </div>
      `;
      cartItemsEl.appendChild(div);
    });

    updateSummary();
  }

  function updateSummary(){
    const shipping = parseInt(provinceEl.selectedOptions[0].dataset.shipping)||0;
    let baseTotal = cart.reduce((a,b)=>a+b.price*b.qty,0);
    let totalQty = cart.reduce((a,b)=>a+b.qty,0);
    baseTotalEl.innerText = baseTotal;
    totalQtyEl.innerText = totalQty;
    
  }

  // ===== أحداث تعديل الكمية والحذف =====
  cartItemsEl.addEventListener("click",e=>{
    if(e.target.classList.contains("plus")){
      const i = e.target.dataset.index;
      if(cart[i].qty < 100){ cart[i].qty++; }
      localStorage.setItem("cart",JSON.stringify(cart));
      renderCart();
    }
    if(e.target.classList.contains("minus")){
      const i = e.target.dataset.index;
      if(cart[i].qty >1){ cart[i].qty--; }
      localStorage.setItem("cart",JSON.stringify(cart));
      renderCart();
    }
    if(e.target.classList.contains("remove-btn")){
      const i = e.target.dataset.index;
      cart.splice(i,1);
      localStorage.setItem("cart",JSON.stringify(cart));
      renderCart();
    }
  });

  provinceEl.addEventListener("change", updateModalTotals);

  // ===== فتح وغلق modal =====
  checkoutBtn.onclick = ()=>{ 
    buyModal.style.opacity="1";
    buyModal.style.pointerEvents="auto";
    updateModalTotals();
    const modalTotalEl = document.getElementById("modalTotal");
    if(modalTotalEl) modalTotalEl.innerText = grandTotalEl.innerText;
  };
  closeModal.onclick = ()=>{ buyModal.style.opacity="0"; buyModal.style.pointerEvents="none"; }

  // ===== تعليمات الدفع =====
  function updatePaymentInstructions(){
    const method = paymentMethodEl.value;
    if(method === "cod"){
      paymentInstructions.innerText = "لإتمام الدفع عند الاستلام، يرجى تحويل مبلغ الشحن على رقم فودافون كاش: 01021006065";
      transferLabel.style.display="block"; 
      transferImg.style.display="block";
      transferImg.required = true;
    } else if(method === "Vodafon"){
      paymentInstructions.innerText = "لإتمام الدفع، يرجى تحويل كامل مبلغ الأوردر على فودافون كاش على الرقم: 01021006065";
      transferLabel.style.display="block";
      transferImg.style.display="block";
      transferImg.required = true;
    }
  }
  paymentMethodEl.addEventListener("change",updatePaymentInstructions);
  updatePaymentInstructions();




function updateModalTotals(){
  const shipping = parseInt(provinceEl.selectedOptions[0].dataset.shipping)||0;
  const baseTotal = cart.reduce((a,b)=>a+b.price*b.qty,0);
  const grandTotal = baseTotal + shipping;

  document.getElementById("modalBaseTotal").innerText = baseTotal;
  document.getElementById("modalShipping").innerText = shipping;
  document.getElementById("modalGrandTotal").innerText = grandTotal;
}





  // ===== إرسال الطلب =====
  form.onsubmit = async (e)=>{
    e.preventDefault();

     loadingScreen.style.display = "flex";

      try {
    const name = document.getElementById("userName").value.trim();
    const phone = document.getElementById("userPhone").value.trim();
    const address = document.getElementById("userAddress").value.trim();
    const paymentMethod = paymentMethodEl.value;
    const terms = document.getElementById("terms").checked;
    const shipping = parseInt(provinceEl.selectedOptions[0].dataset.shipping)||0;

    if(!name || !phone || !address){ alert("Please fill all fields"); return;}
    if(!terms){ alert("Agree to terms"); return;}

    const transferFile = transferImg.files[0];
    let transferUrl = "";

    if(!transferFile){
      alert("مطلوب رفع صورة الحوالة قبل تأكيد الأوردر!");
      return;
    }

    // رفع الصورة عبر API
    const formData = new FormData();
    formData.append("image", transferFile);
    try {
      const res = await fetch("https://api.imgbb.com/1/upload?key=c976859feec5571cab43ec2bffbf015d",{
        method:"POST",
        body: formData
      });
      const data = await res.json();
      if(data.success){ transferUrl = data.data.url; } 
      else { alert("حدث خطأ أثناء رفع الصورة"); return; }
    }catch(err){ alert("خطأ في الاتصال بخدمة رفع الصور: "+err); return; }

    // حفظ الأوردر في Firestore
    try{
    await runTransaction(db, async t => {

  let orderItems = [];
  let productData = [];

  // ✅ 1. نقرأ كل المنتجات الأول
  for(let i = 0; i < cart.length; i++){
    const item = cart[i];
    const prodRef = doc(db, "products", item.id);
    const prodSnap = await t.get(prodRef);

    if(!prodSnap.exists()) throw "Product missing";

    productData.push({
      ref: prodRef,
      data: prodSnap.data(),
      item: item
    });
  }

  // ✅ 2. نعمل validation + تجهيز البيانات
  for(let p of productData){
    let stock = Number(p.data.quantity || 0);

    if(p.item.qty > stock){
      throw `الكمية غير متوفرة للمنتج ${p.item.name}`;
    }

    orderItems.push({
      productId: p.item.id,
      name: p.item.name,
      price: p.item.price,
      quantity: p.item.qty
    });
  }

  // ✅ 3. نعمل update بعد ما خلصنا reads
  for(let p of productData){
    let stock = Number(p.data.quantity || 0);

    t.update(p.ref, {
      quantity: stock - p.item.qty
    });
  }

  // ✅ 4. إنشاء الأوردر
  const orderRef = doc(collection(db, "orders"));

  t.set(orderRef, {
    userId: auth.currentUser ? auth.currentUser.uid : null,
    items: orderItems,
    totalPrice: orderItems.reduce((a,b)=>a+(b.price*b.quantity),0) + shipping,
    paymentMethod,
    transferImage: transferUrl,
    userName: name,
    userPhone: phone,
    userAddress: address,
    province: provinceEl.value,
    createdAt: serverTimestamp(),
    status: "pending"
  });

});
      showToast("تم الشراء 🎉 جاري المراجعة الآن");
      buyModal.style.opacity="0"; buyModal.style.pointerEvents="none";
      cart = []; localStorage.setItem("cart",JSON.stringify(cart));
      renderCart();
    }catch(err){ alert("Error: "+err); }
 } finally {
    // اخفاء loading بعد أي نتيجة
    loadingScreen.style.display = "none";
  }
};

  renderCart();

});
</script>
</body>
</html>
